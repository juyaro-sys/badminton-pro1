<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>배드민턴 PRO</title>
<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px
}

h1{
margin-bottom:10px
}

button{
padding:10px 15px;
margin:5px;
font-size:16px;
border:none;
background:#2c7be5;
color:white;
border-radius:5px
}

input{
padding:5px;
width:60px
}

table{
margin:auto;
border-collapse:collapse;
background:white
}

td,th{
border:1px solid #aaa;
padding:8px
}

.teamBox{
margin-bottom:20px
}

</style>
</head>
<body>
<h1>🏸 배드민턴 경기관리 PRO</h1>
<div class="teamBox">
<input id="teamName" placeholder="팀 이름">
<button onclick="addTeam()">팀 추가</button>
<h3>팀 목록</h3>
<div id="teams"></div>
</div>
<h2>경기 일정</h2>
<div id="matches"></div>
<h2>순위</h2>
<div id="ranking"></div>
<script>

let teams=[]
let matches=[]

function addTeam(){

let t=document.getElementById("teamName").value

if(t=="") return

teams.push(t)

document.getElementById("teams").innerHTML=teams.join("<br>")

document.getElementById("teamName").value=""

}

function makeLeague(){

matches=[]

for(let i=0;i<teams.length;i++){

for(let j=i+1;j<teams.length;j++){

matches.push({
a:teams[i],
b:teams[j],
sa:"",
sb:""
})

}

}

drawMatches()

}

function drawMatches(){

let html="<table>"
html+="<tr><th>팀A</th><th>점수</th><th>팀B</th></tr>"

matches.forEach((m,i)=>{

html+=`
<tr>
<td>${m.a}</td>
<td>
<input onchange="score(${i},0,this.value)">
:
<input onchange="score(${i},1,this.value)">
</td>
<td>${m.b}</td>
</tr>
`

})

html+="</table>"

document.getElementById("matches").innerHTML=html

}

function score(i,t,v){

if(t==0) matches[i].sa=v
else matches[i].sb=v

calcRank()

}

function calcRank(){

let table={}

teams.forEach(t=>{

table[t]={win:0,lose:0,point:0}

})

matches.forEach(m=>{

if(m.sa==""||m.sb=="") return

let a=parseInt(m.sa)
let b=parseInt(m.sb)

table[m.a].point+=a-b
table[m.b].point+=b-a

if(a>b){

table[m.a].win++
table[m.b].lose++

}else{

table[m.b].win++
table[m.a].lose++

}

})

let arr=Object.entries(table)

arr.sort((x,y)=>{

if(y[1].win!=x[1].win)
return y[1].win-x[1].win

return y[1].point-x[1].point

})

let html="<table>"
html+="<tr><th>팀</th><th>승</th><th>패</th><th>득실</th></tr>"

arr.forEach(r=>{

html+=`
<tr>
<td>${r[0]}</td>
<td>${r[1].win}</td>
<td>${r[1].lose}</td>
<td>${r[1].point}</td>
</tr>
`

})

html+="</table>"

document.getElementById("ranking").innerHTML=html

}

</script>
</body>
</html>
:::
