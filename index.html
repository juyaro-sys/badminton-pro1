<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🏸 Badminton Tournament</title>
<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px
}

button{
padding:10px 15px;
margin:5px;
font-size:16px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px
}

input{
width:40px;
padding:4px
}

table{
margin:auto;
border-collapse:collapse;
background:white;
margin-top:10px
}

td,th{
border:1px solid #999;
padding:8px
}

h3{
margin-top:30px
}

</style>

</head>

<body>

<h2>🏸 배드민턴 대회관리 PRO</h2>

<input id="teamInput" placeholder="팀">
<button onclick="addTeam()">팀 추가</button>

<h3>팀 목록</h3>
<div id="teamList"></div>

<br>

<h3>토너먼트</h3>
<div id="tournament"></div>

  <script>

let teams=[]
let groupA=[]
let groupB=[]
let matches=[]

function addTeam(){

let name=document.getElementById("teamInput").value

if(name=="") return

teams.push(name)

document.getElementById("teamList").innerHTML=teams.join("<br>")

document.getElementById("teamInput").value=""

}

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

[arr[i],arr[j]]=[arr[j],arr[i]]

}

}

function createGroups(){

matches=[]

let temp=[...teams]

shuffle(temp)

let mid=Math.ceil(temp.length/2)

groupA=temp.slice(0,mid)

groupB=temp.slice(mid)

makeGroupMatches(groupA)
makeGroupMatches(groupB)

drawMatches()

}

function makeGroupMatches(group){

for(let i=0;i<group.length;i++){

for(let j=i+1;j<group.length;j++){

matches.push({
a:group[i],
b:group[j],
sa:"",
sb:""
})

}

}

}

function drawMatches(){

let html="<table>"
html+="<tr><th>팀A</th><th>점수</th><th>팀B</th></tr>"

matches.forEach((m,i)=>{

html+=`
<tr>
<td>${m.a}</td>
<td>
<input onchange="save(${i},0,this.value)"> :
<input onchange="save(${i},1,this.value)">
</td>
<td>${m.b}</td>
</tr>
`

})

html+="</table>"

document.getElementById("groupMatches").innerHTML=html

}

function save(i,t,v){

if(t==0) matches[i].sa=v
else matches[i].sb=v

updateRank()

}

function updateRank(){

let table={}

teams.forEach(t=>{

table[t]={w:0,l:0,p:0}

})

matches.forEach(m=>{

if(m.sa==""||m.sb=="") return

let a=parseInt(m.sa)
let b=parseInt(m.sb)

table[m.a].p+=a-b
table[m.b].p+=b-a

if(a>b){

table[m.a].w++
table[m.b].l++

}else{

table[m.b].w++
table[m.a].l++

}

})

let arr=Object.entries(table)

arr.sort((x,y)=>{

if(y[1].w!=x[1].w)
return y[1].w-x[1].w

return y[1].p-x[1].p

})

let html="<table>"
html+="<tr><th>팀</th><th>승</th><th>패</th><th>득실</th></tr>"

arr.forEach(r=>{

html+=`
<tr>
<td>${r[0]}</td>
<td>${r[1].w}</td>
<td>${r[1].l}</td>
<td>${r[1].p}</td>
</tr>
`

})

html+="</table>"

document.getElementById("groupRank").innerHTML=html

}

function makeTournament(){

let table={}

teams.forEach(t=>{
table[t]={w:0,p:0}
})

matches.forEach(m=>{

if(m.sa==""||m.sb=="") return

let a=parseInt(m.sa)
let b=parseInt(m.sb)

table[m.a].p+=a-b
table[m.b].p+=b-a

if(a>b) table[m.a].w++
else table[m.b].w++

})

let arr=Object.entries(table)

arr.sort((x,y)=>{

if(y[1].w!=x[1].w)
return y[1].w-x[1].w

return y[1].p-x[1].p

})

let top4=arr.slice(0,4)

let html="<table>"
html+="<tr><th>4강</th></tr>"

html+=`
<tr><td>${top4[0][0]} vs ${top4[3][0]}</td></tr>
<tr><td>${top4[1][0]} vs ${top4[2][0]}</td></tr>
`

html+="</table>"

document.getElementById("tournament").innerHTML=html

}

</script>

  </body>
</html>
:::
